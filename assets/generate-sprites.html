<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sprite Generator</title>
<style>
body { background: #222; color: #fff; font-family: sans-serif; padding: 20px; }
canvas { image-rendering: pixelated; border: 2px solid #444; margin: 10px; background: transparent; }
.sprite-container { display: inline-block; text-align: center; margin: 10px; }
</style>
</head>
<body>
<h2>Cat Sprite Generator</h2>
<div id="sprites"></div>

<script>
const PALETTE = {
  W: '#ffffff',      // white fur
  w: '#f0f0f0',      // light shadow
  G: '#e8e8e8',      // gray shadow
  g: '#d0d0d0',      // darker shadow
  P: '#ffb6c1',      // pink (ears, nose, blush)
  p: '#ff8da1',      // darker pink
  B: '#2a1a10',      // dark brown eye
  b: '#5a3a20',      // medium brown
  K: '#000000',      // black outline
  k: '#3a3a3a',      // dark gray
  T: '#ff8888',      // tongue
  O: '#ffaaaa',      // mouth interior
  _: 'transparent'   // transparent
};

// 32x32 pixel art cat - IDLE (front-facing, happy)
const CAT_IDLE = [
  "________________________________",
  "______________KKKK______________",
  "____________KKWWWWKK____________",
  "___________KWWWWWWWWK___________",
  "__________KWWWWWWWWWWK__________",
  "_________KWWWWWWWWWWWWK_________",
  "________KWWWKWWWWWKWWWK_________",

  "______KWWWWWWWWWWWWWWWWWWK______",
  "______KWWWWWWWWWWWWWWWWWWK______",
  "______KWWWWWWWWWWWWWWWWWWK______",
  "______KWWWKWWWWWWWWWKWWWWK______",
  "_______KWWKWWWWWWWWWKWWWK_______",
  "________KWKWWBBBBWWWKWKK________",
  "_________KWWBWWWWBWWWK__________",
  "__________KWBWBBBWBBWK__________",
  "__________KWWBWWWWBWWK__________",
  "___________KWWWBWBWWWK___________",
  "___________KKWWPPWWKK___________",
  "___________KPPPPTPPPK___________",
  "___________KPPTTTTPPK___________",
  "___________KPPPTTPPPK___________",
  "____________KPPPPPPPK____________",
  "____________KKWWWWKK____________",
  "______________KWWK______________",
  "_______________KK_______________",
  "________________________________",
  "________________________________",
  "________________________________"
];

// 32x32 - WALKING/RUNNING (side view)
const CAT_RUN = [
  "________________________________",
  "______________KKKK______________",
  "____________KKWWWWKK____________",
  "___________KWWWWWWWWK___________",
  "__________KWWWWWWWWWWK__________",
  "_________KWWWWWWWWWWWWK_________",
  "________KWWWKWWWWWKWWWK_________",
  "_______KWWWKKWWWWWKKWWWK________",
  "______KWWWKPWWWWWWWPWWWKK_______",
  "______KWWKPWWWWWWWWWPWWWKK______",
  "______KWWWPWWWWWWWWWWPWWWK______",
  "______KWWWWWWWWWWWWWWWWWWK______",
  "______KWWWWWWWWWWWWWWWWWWK______",
  "______KWWWWWWWWWWWWWWWWWWK______",
  "_______KWWWWWWWWWWWWWWWWWK______",

// 32x32 - SLEEPING (curled up)

  "______KWWWK_WWKKWWK______________",

function renderSprite(pixelMap, scale = 4) {
  const size = 32;
  const canvas = document.createElement('canvas');
  canvas.width = size * scale;
  canvas.height = size * scale;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const ch = pixelMap[y][x];
      if (ch !== '_' && ch !== ' ') {
        ctx.fillStyle = PALETTE[ch] || '#f0f';
        ctx.fillRect(x * scale, y * scale, scale, scale);
      }
    }
  }
  return canvas;
}

function exportPNG(canvas, filename) {
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.textContent = `Download ${filename}`;
  return link;
}

const spritesDiv = document.getElementById('sprites');

const idleCanvas = renderSprite(CAT_IDLE, 8);
const runCanvas = renderSprite(CAT_RUN, 8);
const sleepCanvas = renderSprite(CAT_SLEEP, 8);

[{name:'cat-idle.png', c:idleCanvas}, {name:'cat-run.png', c:runCanvas}, {name:'cat-sleep.png', c:sleepCanvas}].forEach(s => {
  const div = document.createElement('div');
  div.className = 'sprite-container';
  const label = document.createElement('div');
  label.textContent = s.name;
  div.appendChild(label);
  div.appendChild(s.c);
  const link = exportPNG(s.c, s.name);
  link.style.display = 'block';
  link.style.color = '#6cf';
  div.appendChild(link);
  spritesDiv.appendChild(div);
});

// Also show at actual game scale
const idleSmall = renderSprite(CAT_IDLE, 1);
const runSmall = renderSprite(CAT_RUN, 1);
const sleepSmall = renderSprite(CAT_SLEEP, 1);

[{name:'cat-idle-1x.png', c:idleSmall}, {name:'cat-run-1x.png', c:runSmall}, {name:'cat-sleep-1x.png', c:sleepSmall}].forEach(s => {
  const div = document.createElement('div');
  div.className = 'sprite-container';
  const label = document.createElement('div');
  label.textContent = s.name + ' (1x)';
  div.appendChild(label);
  s.c.style.width = '128px';
  s.c.style.height = '128px';
  div.appendChild(s.c);
  const link = exportPNG(s.c, s.name);
  link.style.display = 'block';
  link.style.color = '#6cf';
  div.appendChild(link);
  spritesDiv.appendChild(div);
});

console.log('Sprites generated! Click download links to save.');
