function drawPixel(ctx, x, y, color) {
  if (color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, 1, 1);
  }
}

function drawSprite(ctx, mapStr) {
  const lines = mapStr.trim().split('\n');
  for (let y = 0; y < lines.length; y++) {
    const line = lines[y];
    for (let x = 0; x < line.length; x++) {
      drawPixel(ctx, x, y, PALETTE[line[x]]);
    }
  }
}

function createSpriteCanvas(pixelMap, scale) {
  const size = 64;
  const canvas = document.createElement('canvas');
  canvas.width = size * scale;
  canvas.height = size * scale;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  
  const lines = pixelMap.trim().split('\n');
  for (let y = 0; y < size; y++) {
    const line = lines[y] || '';
    for (let x = 0; x < size; x++) {
      const ch = line[x] || '_';
      if (ch !== '_' && ch !== ' ' && PALETTE[ch]) {
        ctx.fillStyle = PALETTE[ch];
        ctx.fillRect(x * scale, y * scale, scale, scale);
      }
    }
  }
  return canvas;
}

  div.appendChild(label);
  s.c.style.width = '256px';
  s.c.style.height = '256px';
  div.appendChild(s.c);
  
  const link = document.createElement('a');
  link.download = s.name;
  link.href = s.c.toDataURL('image/png');
  link.textContent = 'Download ' + s.name;
  link.style.display = 'block';
  link.style.color = '#6cf';
  link.style.marginTop = '5px';
  div.appendChild(link);
  spritesDiv.appendChild(div);
});
