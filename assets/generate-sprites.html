<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cat Sprite Generator</title>
<style>
body { background: #222; color: #fff; font-family: sans-serif; padding: 20px; }
canvas { image-rendering: pixelated; border: 2px solid #555; margin: 10px; background: #87CEEB; }
.sprite-container { display: inline-block; text-align: center; margin: 15px; }
</style>
</head>
<body>
<h2>Mittens the Cat Sprites</h2>
<div id="sprites"></div>

<script>
const SIZE = 64;

function createCanvas() {
  const c = document.createElement('canvas');
  c.width = SIZE;
  c.height = SIZE;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  return { c, ctx };
}

// Draw a white cat facing forward (idle)
function drawIdleCat(ctx) {
  const cx = SIZE / 2;
  const cy = SIZE / 2;

  // === EARS (pointed triangles on top) ===
  // Left ear
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(cx - 18, cy - 18);
  ctx.lineTo(cx - 24, cy - 36);
  ctx.lineTo(cx - 6, cy - 26);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Right ear
  ctx.beginPath();
  ctx.moveTo(cx + 18, cy - 18);
  ctx.lineTo(cx + 24, cy - 36);
  ctx.lineTo(cx + 6, cy - 26);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Inner ear pink
  ctx.fillStyle = '#ffb6c1';
  ctx.beginPath();
  ctx.moveTo(cx - 17, cy - 20);
  ctx.lineTo(cx - 21, cy - 32);
  ctx.lineTo(cx - 10, cy - 24);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(cx + 17, cy - 20);
  ctx.lineTo(cx + 21, cy - 32);
  ctx.lineTo(cx + 10, cy - 24);
  ctx.closePath();
  ctx.fill();

  // === HEAD (round) ===
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(cx, cy - 8, 18, 0, Math.PI * 2);
  ctx.fill();

  // Subtle head outline
  ctx.strokeStyle = '#eee';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // === EYES (large black circles with white shine) ===
  // Left eye
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(cx - 7, cy - 10, 3.5, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Right eye
  ctx.beginPath();
  ctx.ellipse(cx + 7, cy - 10, 3.5, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eye shine (white dots)
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(cx - 5.5, cy - 12, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + 8.5, cy - 12, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // === NOSE (tiny pink triangle) ===
  ctx.fillStyle = '#ff99aa';
  ctx.beginPath();
  ctx.moveTo(cx, cy - 4);
  ctx.lineTo(cx - 2.5, cy);
  ctx.lineTo(cx + 2.5, cy);
  ctx.closePath();
  ctx.fill();

  // === MOUTH (small smile) ===
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.arc(cx - 2, cy + 0.5, 2, 0, Math.PI);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx + 2, cy + 0.5, 2, 0, Math.PI);
  ctx.stroke();

  // === WHISKERS ===
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth = 0.6;
  // Left whiskers
  ctx.beginPath();
  ctx.moveTo(cx - 10, cy - 2);
  ctx.lineTo(cx - 22, cy - 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - 10, cy);
  ctx.lineTo(cx - 23, cy);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - 10, cy + 2);
  ctx.lineTo(cx - 22, cy + 4);
  ctx.stroke();

  // Right whiskers
  ctx.beginPath();
  ctx.moveTo(cx + 10, cy - 2);
  ctx.lineTo(cx + 22, cy - 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + 10, cy);
  ctx.lineTo(cx + 23, cy);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + 10, cy + 2);
  ctx.lineTo(cx + 22, cy + 4);
  ctx.stroke();

  // === BODY (chubby oval below head) ===
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 16, 16, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // === BELLY (slightly lighter area) ===
  ctx.fillStyle = '#f8f8f8';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 20, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // === FRONT PAWS ===
  ctx.fillStyle = '#ffffff';
  // Left paw
  ctx.beginPath();
  ctx.ellipse(cx - 8, cy + 28, 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Right paw
  ctx.beginPath();
  ctx.ellipse(cx + 8, cy + 28, 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pink paw pads
  ctx.fillStyle = '#ffb6c1';
  ctx.beginPath();
  ctx.arc(cx - 8, cy + 29, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + 8, cy + 29, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // === COLLAR (pink band around neck) ===
  ctx.strokeStyle = '#ff7799';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.ellipse(cx, cy + 6, 12, 3, 0, 0, Math.PI);
  ctx.stroke();

  // Bell
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(cx, cy + 9, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#daa520';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // === TAIL (curved up behind body) ===
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx + 14, cy + 22);
  ctx.quadraticCurveTo(cx + 26, cy + 18, cx + 24, cy + 6);
  ctx.stroke();
}

// Draw a white cat in side profile running (run)
function drawRunCat(ctx) {
  const cx = SIZE / 2;
  const cy = SIZE / 2 + 2;

  // === TAIL (curved up) ===
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx + 14, cy + 4);
  ctx.quadraticCurveTo(cx + 26, cy - 2, cx + 22, cy - 14);
  ctx.stroke();

  // === BACK LEG (stretched back) ===
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(cx + 6, cy + 14, 5, 10, -0.6, 0, Math.PI * 2);
  ctx.fill();
  // Back paw
  ctx.beginPath();
  ctx.ellipse(cx + 2, cy + 22, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // === FRONT LEG (stretched forward) ===
  ctx.beginPath();
  ctx.ellipse(cx - 6, cy + 14, 5, 10, 0.6, 0, Math.PI * 2);
  ctx.fill();
  // Front paw
  ctx.beginPath();
  ctx.ellipse(cx - 10, cy + 22, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // === BODY (horizontal oval) ===
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 2, 18, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // === HEAD (circle, slightly forward) ===
  ctx.beginPath();
  ctx.arc(cx - 14, cy - 8, 14, 0, Math.PI * 2);
  ctx.fill();

  // === EAR (pointed, facing left) ===
  ctx.beginPath();
  ctx.moveTo(cx - 22, cy - 18);
  ctx.lineTo(cx - 28, cy - 30);
  ctx.lineTo(cx - 14, cy - 22);
  ctx.closePath();
  ctx.fill();

  // Inner ear
  ctx.fillStyle = '#ffb6c1';
  ctx.beginPath();
  ctx.moveTo(cx - 21, cy - 20);
  ctx.lineTo(cx - 25, cy - 27);
  ctx.lineTo(cx - 17, cy - 21);
  ctx.closePath();
  ctx.fill();

  // === PROFILE FACE ===
  ctx.fillStyle = '#222';
  // Eye (facing left)
  ctx.beginPath();
  ctx.ellipse(cx - 20, cy - 10, 3, 4.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx - 19, cy - 12, 1, 0, Math.PI * 2);
  ctx.fill();

  // Nose (small pink, leftmost)
  ctx.fillStyle = '#ff99aa';
  ctx.beginPath();
  ctx.arc(cx - 26, cy - 4, 2, 0, Math.PI * 2);
  ctx.fill();

  // Mouth line
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(cx - 24, cy - 2);
  ctx.lineTo(cx - 20, cy + 1);
  ctx.stroke();

  // === BELLY HIGHLIGHT ===
  ctx.fillStyle = '#f8f8f8';
  ctx.beginPath();
  ctx.ellipse(cx - 2, cy + 4, 10, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // === COLLAR ===
  ctx.strokeStyle = '#ff7799';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx - 10, cy + 2, 8, 0.3, Math.PI - 0.3);
  ctx.stroke();

  // === PINK PAW PADS ===
  ctx.fillStyle = '#ffb6c1';
  ctx.beginPath();
  ctx.arc(cx - 10, cy + 23, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + 2, cy + 23, 1.2, 0, Math.PI * 2);
  ctx.fill();
}

// Draw a sleeping curled-up cat (sleep)
function drawSleepCat(ctx) {
  const cx = SIZE / 2;
  const cy = SIZE / 2 + 2;

  // === BODY (large curled oval) ===
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 4, 22, 16, 0, 0, Math.PI * 2);
  ctx.fill();

  // === HEAD (tucked on left side) ===
  ctx.beginPath();
  ctx.arc(cx - 12, cy - 2, 14, 0, Math.PI * 2);
  ctx.fill();

  // === EAR (pointed, visible from top) ===
  ctx.beginPath();
  ctx.moveTo(cx - 18, cy - 12);
  ctx.lineTo(cx - 24, cy - 22);
  ctx.lineTo(cx - 10, cy - 16);
  ctx.closePath();
  ctx.fill();

  // Inner ear
  ctx.fillStyle = '#ffb6c1';
  ctx.beginPath();
  ctx.moveTo(cx - 17, cy - 14);
  ctx.lineTo(cx - 21, cy - 20);
  ctx.lineTo(cx - 12, cy - 15);
  ctx.closePath();
  ctx.fill();

  // === CLOSED EYES (sleeping lines) ===
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(cx - 18, cy - 4);
  ctx.quadraticCurveTo(cx - 16, cy - 2, cx - 14, cy - 4);
  ctx.stroke();

  // === NOSE ===
  ctx.fillStyle = '#ff99aa';
  ctx.beginPath();
  ctx.arc(cx - 22, cy + 1, 1.8, 0, Math.PI * 2);
  ctx.fill();

  // === TAIL (wrapped around body from right) ===
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx + 20, cy + 10);
  ctx.quadraticCurveTo(cx + 28, cy + 2, cx + 20, cy - 6);
  ctx.quadraticCurveTo(cx + 10, cy - 14, cx + 2, cy - 10);
  ctx.stroke();

  // === BELLY ===
  ctx.fillStyle = '#f8f8f8';
  ctx.beginPath();
  ctx.ellipse(cx + 2, cy + 6, 14, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // === PAWS (tucked under) ===
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(cx - 6, cy + 16, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + 10, cy + 16, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // === ZZZ (sleep bubbles) ===
  ctx.fillStyle = '#88bbee';
  ctx.font = 'bold 8px sans-serif';
  ctx.fillText('z', cx + 6, cy - 14);
  ctx.fillStyle = '#6699cc';
  ctx.font = 'bold 6px sans-serif';
  ctx.fillText('z', cx + 12, cy - 20);
  ctx.fillStyle = '#4477aa';
  ctx.font = 'bold 5px sans-serif';
  ctx.fillText('z', cx + 16, cy - 24);
}

function generateSprite(drawFn) {
  const { c, ctx } = createCanvas();

  // Fill transparent background
  ctx.clearRect(0, 0, SIZE, SIZE);

  drawFn(ctx);

  return c;
}

// Generate all sprites
const idleCanvas = generateSprite(drawIdleCat);
const runCanvas = generateSprite(drawRunCat);
const sleepCanvas = generateSprite(drawSleepCat);

// Display and download
const spritesDiv = document.getElementById('sprites');

[{name:'cat-idle.png', c:idleCanvas}, {name:'cat-run.png', c:runCanvas}, {name:'cat-sleep.png', c:sleepCanvas}].forEach(s => {
  const div = document.createElement('div');
  div.className = 'sprite-container';
  const label = document.createElement('div');
  label.textContent = s.name + ' (64x64)';
  div.appendChild(label);

  // Preview at 4x
  s.c.style.width = '256px';
  s.c.style.height = '256px';
  s.c.style.imageRendering = 'pixelated';
  div.appendChild(s.c);

  const link = document.createElement('a');
  link.download = s.name;
  link.href = s.c.toDataURL('image/png');
  link.textContent = 'Download ' + s.name;
  link.style.display = 'block';
  link.style.color = '#6cf';
  link.style.marginTop = '5px';
  div.appendChild(link);
  spritesDiv.appendChild(div);
});

console.log('Cat sprites generated!');
</script>
</body>
</html>
