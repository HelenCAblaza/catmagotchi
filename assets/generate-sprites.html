<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cat Sprite Generator</title>
<style>
body { background: #222; color: #fff; font-family: sans-serif; padding: 20px; }
canvas { image-rendering: pixelated; border: 2px solid #555; margin: 10px; background: #87CEEB; }
.sprite-container { display: inline-block; text-align: center; margin: 15px; }
</style>
</head>
<body>
<h2>Mittens the Cat Sprites</h2>
<div id="sprites"></div>

<script>
const SIZE = 64;

function createCanvas() {
  const c = document.createElement('canvas');
  c.width = SIZE;
  c.height = SIZE;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  return { c, ctx };
}

// Helper: draw a pixelated filled circle
function fillCircle(ctx, cx, cy, r, color) {
  ctx.fillStyle = color;
  for (let y = -r; y <= r; y++) {
    for (let x = -r; x <= r; x++) {
      if (x * x + y * y <= r * r + 1) {
        ctx.fillRect(cx + x, cy + y, 1, 1);
      }
    }
  }
}

// Helper: draw a thick pixelated line
function drawLine(ctx, x1, y1, x2, y2, color, thickness) {
  ctx.fillStyle = color;
  const dx = Math.abs(x2 - x1);
  const dy = Math.abs(y2 - y1);
  const sx = x1 < x2 ? 1 : -1;
  const sy = y1 < y2 ? 1 : -1;
  let err = dx - dy;
  let x = x1;
  let y = y1;

  while (true) {
    for (let ty = -Math.floor(thickness / 2); ty <= Math.floor(thickness / 2); ty++) {
      for (let tx = -Math.floor(thickness / 2); tx <= Math.floor(thickness / 2); tx++) {
        ctx.fillRect(x + tx, y + ty, 1, 1);
      }
    }
    if (x === x2 && y === y2) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x += sx; }
    if (e2 < dx) { err += dx; y += sy; }
  }
}

// Draw a cute white cat in the reference style (idle - standing, facing front-left)
function drawIdleCat(ctx) {
  // Cute proportions: big head, small body

  // === TAIL (curled up behind) ===
  // Tail base
  fillCircle(ctx, 48, 28, 4, '#ffffff');
  // Tail curl up
  drawLine(ctx, 48, 24, 52, 16, '#ffffff', 4);
  drawLine(ctx, 52, 16, 52, 8, '#ffffff', 4);
  drawLine(ctx, 52, 8, 46, 4, '#ffffff', 4);
  // Tail tip
  fillCircle(ctx, 46, 4, 3, '#ffffff');

  // === BODY (small chubby body under head) ===
  fillCircle(ctx, 28, 42, 10, '#ffffff');
  fillCircle(ctx, 36, 44, 9, '#ffffff');
  // Belly highlight
  fillCircle(ctx, 32, 44, 6, '#f8f8f8');

  // === LEGS/PAWS ===
  // Front left leg
  fillCircle(ctx, 20, 50, 4, '#ffffff');
  fillCircle(ctx, 20, 54, 3, '#ffffff');
  // Front right leg
  fillCircle(ctx, 34, 52, 4, '#ffffff');
  fillCircle(ctx, 34, 56, 3, '#ffffff');
  // Back legs
  fillCircle(ctx, 42, 52, 3, '#ffffff');
  fillCircle(ctx, 46, 50, 3, '#ffffff');
  // Pink paws
  fillCircle(ctx, 20, 56, 2, '#ffb6c1');
  fillCircle(ctx, 34, 58, 2, '#ffb6c1');

  // === HEAD (big round head) ===
  fillCircle(ctx, 24, 20, 18, '#ffffff');
  // Darker outline/shadow around head bottom-right
  drawLine(ctx, 30, 34, 38, 28, '#e0e0e0', 1);
  drawLine(ctx, 38, 28, 40, 20, '#e0e0e0', 1);

  // === EARS (large triangles on top) ===
  // Left ear outer
  ctx.fillStyle = '#ffffff';
  for (let y = 0; y < 10; y++) {
    const width = Math.floor((10 - y) * 0.6);
    for (let x = -width; x <= width; x++) {
      ctx.fillRect(10 + x, 6 + y, 1, 1);
    }
  }
  // Left ear inner (pink)
  ctx.fillStyle = '#ffb6c1';
  for (let y = 2; y < 8; y++) {
    const width = Math.floor((8 - y) * 0.4);
    for (let x = -width; x <= width; x++) {
      ctx.fillRect(10 + x, 8 + y, 1, 1);
    }
  }

  // Right ear outer
  ctx.fillStyle = '#ffffff';
  for (let y = 0; y < 10; y++) {
    const width = Math.floor((10 - y) * 0.6);
    for (let x = -width; x <= width; x++) {
      ctx.fillRect(36 + x, 6 + y, 1, 1);
    }
  }
  // Right ear inner (pink)
  ctx.fillStyle = '#ffb6c1';
  for (let y = 2; y < 8; y++) {
    const width = Math.floor((8 - y) * 0.4);
    for (let x = -width; x <= width; x++) {
      ctx.fillRect(36 + x, 8 + y, 1, 1);
    }
  }

  // === EYES (big sparkly eyes like reference) ===
  // Left eye - big dark brown circle
  fillCircle(ctx, 18, 20, 6, '#3d2b1f');
  // Left eye white shine (big highlight top-left)
  fillCircle(ctx, 15, 16, 3, '#ffffff');
  // Left eye small white shine bottom-right
  fillCircle(ctx, 20, 22, 1.5, '#ffffff');

  // Right eye
  fillCircle(ctx, 32, 22, 6, '#3d2b1f');
  // Right eye white shine
  fillCircle(ctx, 29, 18, 3, '#ffffff');
  // Right eye small white shine
  fillCircle(ctx, 34, 24, 1.5, '#ffffff');

  // === PINK BLUSH on cheeks ===
  fillCircle(ctx, 12, 26, 3, '#ffb6c1');
  fillCircle(ctx, 38, 28, 3, '#ffb6c1');

  // === NOSE ===
  fillCircle(ctx, 24, 24, 2, '#ff99aa');

  // === HAPPY MOUTH (open with tongue) ===
  // Mouth outline (happy smile)
  drawLine(ctx, 20, 28, 24, 32, '#cc6666', 1);
  drawLine(ctx, 24, 32, 28, 28, '#cc6666', 1);
  // Tongue inside
  fillCircle(ctx, 24, 30, 2.5, '#ff7799');

  // === WHISKERS (dark, short, angled) ===
  // Left whiskers
  drawLine(ctx, 8, 22, 2, 18, '#5a3a20', 1);
  drawLine(ctx, 8, 24, 1, 24, '#5a3a20', 1);
  drawLine(ctx, 8, 26, 2, 30, '#5a3a20', 1);
  // Right whiskers
  drawLine(ctx, 40, 24, 46, 20, '#5a3a20', 1);
  drawLine(ctx, 40, 26, 47, 26, '#5a3a20', 1);
  drawLine(ctx, 40, 28, 46, 32, '#5a3a20', 1);
}

// Draw a running side-profile cat
function drawRunCat(ctx) {
  // === TAIL (curved up) ===
  drawLine(ctx, 48, 22, 54, 12, '#ffffff', 3);
  drawLine(ctx, 54, 12, 52, 6, '#ffffff', 3);
  fillCircle(ctx, 52, 6, 2, '#ffffff');

  // === BODY ===
  fillCircle(ctx, 32, 34, 9, '#ffffff');
  fillCircle(ctx, 40, 32, 8, '#ffffff');

  // === BACK LEGS ===
  // Back leg stretched back
  drawLine(ctx, 42, 38, 46, 46, '#ffffff', 4);
  fillCircle(ctx, 46, 48, 3, '#ffffff');
  // Other back leg
  drawLine(ctx, 38, 40, 40, 48, '#ffffff', 3);
  fillCircle(ctx, 40, 50, 2, '#ffffff');

  // === FRONT LEGS ===
  // Front leg stretched forward
  drawLine(ctx, 22, 38, 14, 46, '#ffffff', 4);
  fillCircle(ctx, 12, 48, 3, '#ffffff');
  // Other front leg
  drawLine(ctx, 26, 40, 24, 48, '#ffffff', 3);
  fillCircle(ctx, 24, 50, 2, '#ffffff');

  // Pink paws
  fillCircle(ctx, 12, 50, 1.5, '#ffb6c1');
  fillCircle(ctx, 46, 50, 1.5, '#ffb6c1');

  // === HEAD (facing left) ===
  fillCircle(ctx, 20, 22, 14, '#ffffff');

  // === EAR (left-facing) ===
  ctx.fillStyle = '#ffffff';
  for (let y = 0; y < 8; y++) {
    const width = Math.floor((8 - y) * 0.6);
    for (let x = -width; x <= width; x++) {
      ctx.fillRect(10 + x, 10 + y, 1, 1);
    }
  }
  // Inner ear
  ctx.fillStyle = '#ffb6c1';
  for (let y = 2; y < 6; y++) {
    const width = Math.floor((6 - y) * 0.4);
    for (let x = -width; x <= width; x++) {
      ctx.fillRect(10 + x, 12 + y, 1, 1);
    }
  }

  // === EYE (big sparkly) ===
  fillCircle(ctx, 14, 20, 5, '#3d2b1f');
  fillCircle(ctx, 11, 16, 2.5, '#ffffff');
  fillCircle(ctx, 16, 22, 1, '#ffffff');

  // === BLUSH ===
  fillCircle(ctx, 10, 26, 2.5, '#ffb6c1');

  // === NOSE ===
  fillCircle(ctx, 8, 24, 1.5, '#ff99aa');

  // === MOUTH ===
  drawLine(ctx, 8, 27, 10, 29, '#cc6666', 1);

  // === WHISKERS ===
  drawLine(ctx, 6, 22, 1, 18, '#5a3a20', 1);
  drawLine(ctx, 6, 24, 0, 24, '#5a3a20', 1);
  drawLine(ctx, 6, 26, 1, 30, '#5a3a20', 1);
}

// Draw a sleeping curled-up cat
function drawSleepCat(ctx) {
  // === BODY (large round ball) ===
  fillCircle(ctx, 32, 36, 18, '#ffffff');

  // === HEAD (tucked on left) ===
  fillCircle(ctx, 20, 28, 14, '#ffffff');

  // === EAR (sticking up) ===
  ctx.fillStyle = '#ffffff';
  for (let y = 0; y < 8; y++) {
    const width = Math.floor((8 - y) * 0.6);
    for (let x = -width; x <= width; x++) {
      ctx.fillRect(16 + x, 14 + y, 1, 1);
    }
  }
  ctx.fillStyle = '#ffb6c1';
  for (let y = 2; y < 6; y++) {
    const width = Math.floor((6 - y) * 0.4);
    for (let x = -width; x <= width; x++) {
      ctx.fillRect(16 + x, 16 + y, 1, 1);
    }
  }

  // === CLOSED EYES ===
  drawLine(ctx, 12, 26, 16, 28, '#5a3a20', 1);
  drawLine(ctx, 18, 28, 22, 26, '#5a3a20', 1);

  // === BLUSH ===
  fillCircle(ctx, 10, 30, 2.5, '#ffb6c1');

  // === NOSE ===
  fillCircle(ctx, 14, 30, 1.5, '#ff99aa');

  // === MOUTH (small smile) ===
  drawLine(ctx, 14, 32, 18, 32, '#cc6666', 1);

  // === TAIL (wrapped around) ===
  drawLine(ctx, 46, 40, 50, 30, '#ffffff', 4);
  drawLine(ctx, 50, 30, 48, 20, '#ffffff', 4);
  drawLine(ctx, 48, 20, 38, 16, '#ffffff', 4);
  fillCircle(ctx, 38, 16, 3, '#ffffff');

  // === PAWS (tucked in) ===
  fillCircle(ctx, 24, 48, 3, '#ffffff');
  fillCircle(ctx, 36, 50, 3, '#ffffff');

  // === ZZZ ===
  ctx.fillStyle = '#88bbee';
  ctx.font = 'bold 8px monospace';
  ctx.fillText('z', 40, 14);
  ctx.fillStyle = '#6699cc';
  ctx.font = 'bold 6px monospace';
  ctx.fillText('z', 46, 10);
  ctx.fillStyle = '#4477aa';
  ctx.font = 'bold 5px monospace';
  ctx.fillText('z', 50, 6);
}

function generateSprite(drawFn) {
  const { c, ctx } = createCanvas();
  ctx.clearRect(0, 0, SIZE, SIZE);
  drawFn(ctx);
  return c;
}

// Generate all sprites
const idleCanvas = generateSprite(drawIdleCat);
const runCanvas = generateSprite(drawRunCat);
const sleepCanvas = generateSprite(drawSleepCat);

// Display and download
const spritesDiv = document.getElementById('sprites');

[{name:'cat-idle.png', c:idleCanvas}, {name:'cat-run.png', c:runCanvas}, {name:'cat-sleep.png', c:sleepCanvas}].forEach(s => {
  const div = document.createElement('div');
  div.className = 'sprite-container';
  const label = document.createElement('div');
  label.textContent = s.name + ' (64x64)';
  div.appendChild(label);

  s.c.style.width = '256px';
  s.c.style.height = '256px';
  s.c.style.imageRendering = 'pixelated';
  div.appendChild(s.c);

  const link = document.createElement('a');
  link.download = s.name;
  link.href = s.c.toDataURL('image/png');
  link.textContent = 'Download ' + s.name;
  link.style.display = 'block';
  link.style.color = '#6cf';
  link.style.marginTop = '5px';
  div.appendChild(link);
  spritesDiv.appendChild(div);
});

console.log('Cute cat sprites generated!');
</script>
</body>
</html>
