<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>32x32 Cat Sprites</title>
<style>
body { background: #222; color: #fff; font-family: sans-serif; padding: 20px; }
canvas { image-rendering: pixelated; border: 2px solid #555; margin: 10px; background: #87CEEB; }
.sprite-container { display: inline-block; text-align: center; margin: 15px; }
</style>
</head>
<body>
<h2>32x32 Mittens Sprites</h2>
<div id="sprites"></div>

<script>
const SIZE = 32;

function createCanvas() {
  const c = document.createElement('canvas');
  c.width = SIZE;
  c.height = SIZE;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  return { c, ctx };
}

function setPixel(ctx, x, y, color) {
  if (x >= 0 && x < SIZE && y >= 0 && y < SIZE) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, 1, 1);
  }
}

function fillRect(ctx, x, y, w, h, color) {
  for (let py = y; py < y + h; py++) {
    for (let px = x; px < x + w; px++) {
      setPixel(ctx, px, py, color);
    }
  }
}

function fillCircle(ctx, cx, cy, r, color) {
  for (let y = -r; y <= r; y++) {
    for (let x = -r; x <= r; x++) {
      if (x * x + y * y <= r * r + 0.5) {
        setPixel(ctx, cx + x, cy + y, color);
      }
    }
  }
}

// === IDLE CAT (front-facing, sitting) ===
function drawIdleCat(ctx) {
  // Clear transparent
  ctx.clearRect(0, 0, SIZE, SIZE);

  // --- BODY (small oval at bottom center) ---
  fillCircle(ctx, 16, 26, 5, '#ffffff');
  fillCircle(ctx, 16, 24, 4, '#f0f0f0');

  // --- LEGS (short stubs) ---
  fillRect(ctx, 11, 27, 3, 4, '#ffffff');
  fillRect(ctx, 18, 27, 3, 4, '#ffffff');
  // Pink paw pads
  setPixel(ctx, 12, 30, '#ffb6c1');
  setPixel(ctx, 19, 30, '#ffb6c1');

  // --- HEAD (big circle, upper portion) ---
  fillCircle(ctx, 16, 14, 11, '#ffffff');
  // Head shadow
  fillCircle(ctx, 18, 16, 9, '#f5f5f5');

  // --- EARS (triangles on top) ---
  // Left ear outer
  setPixel(ctx, 7, 5, '#ffffff');
  setPixel(ctx, 6, 6, '#ffffff');
  setPixel(ctx, 7, 6, '#ffffff');
  setPixel(ctx, 8, 6, '#ffffff');
  setPixel(ctx, 5, 7, '#ffffff');
  setPixel(ctx, 6, 7, '#ffffff');
  setPixel(ctx, 7, 7, '#ffb6c1');
  setPixel(ctx, 8, 7, '#ffffff');
  setPixel(ctx, 9, 7, '#ffffff');
  setPixel(ctx, 6, 8, '#ffffff');
  setPixel(ctx, 7, 8, '#ffb6c1');
  setPixel(ctx, 8, 8, '#ffffff');
  // Right ear outer
  setPixel(ctx, 25, 5, '#ffffff');
  setPixel(ctx, 24, 6, '#ffffff');
  setPixel(ctx, 25, 6, '#ffffff');
  setPixel(ctx, 26, 6, '#ffffff');
  setPixel(ctx, 23, 7, '#ffffff');
  setPixel(ctx, 24, 7, '#ffffff');
  setPixel(ctx, 25, 7, '#ffb6c1');
  setPixel(ctx, 26, 7, '#ffffff');
  setPixel(ctx, 27, 7, '#ffffff');
  setPixel(ctx, 24, 8, '#ffffff');
  setPixel(ctx, 25, 8, '#ffb6c1');
  setPixel(ctx, 26, 8, '#ffffff');

  // --- EYES (big sparkly) ---
  // Left eye (dark brown)
  fillCircle(ctx, 11, 13, 3, '#3d2b1f');
  // Left eye white shine (top-left highlight)
  fillCircle(ctx, 10, 11, 1, '#ffffff');
  setPixel(ctx, 12, 14, '#ffffff');

  // Right eye
  fillCircle(ctx, 21, 13, 3, '#3d2b1f');
  // Right eye white shine
  fillCircle(ctx, 20, 11, 1, '#ffffff');
  setPixel(ctx, 22, 14, '#ffffff');

  // --- PINK BLUSH on cheeks ---
  fillCircle(ctx, 8, 17, 2, '#ffb6c1');
  fillCircle(ctx, 24, 17, 2, '#ffb6c1');

  // --- NOSE (tiny pink triangle) ---
  setPixel(ctx, 16, 17, '#ff8899');
  setPixel(ctx, 15, 18, '#ff8899');
  setPixel(ctx, 17, 18, '#ff8899');

  // --- MOUTH (happy open) ---
  setPixel(ctx, 15, 19, '#cc5555');
  setPixel(ctx, 16, 20, '#ff7799');
  setPixel(ctx, 17, 19, '#cc5555');

  // --- WHISKERS (thin dark lines) ---
  // Left
  setPixel(ctx, 5, 15, '#666');
  setPixel(ctx, 4, 16, '#666');
  setPixel(ctx, 3, 17, '#666');
  setPixel(ctx, 5, 17, '#666');
  setPixel(ctx, 4, 18, '#666');
  // Right
  setPixel(ctx, 27, 15, '#666');
  setPixel(ctx, 28, 16, '#666');
  setPixel(ctx, 29, 17, '#666');
  setPixel(ctx, 27, 17, '#666');
  setPixel(ctx, 28, 18, '#666');

  // --- TAIL (curved up on right) ---
  setPixel(ctx, 26, 23, '#ffffff');
  setPixel(ctx, 27, 22, '#ffffff');
  setPixel(ctx, 28, 21, '#ffffff');
  setPixel(ctx, 28, 20, '#ffffff');
  setPixel(ctx, 27, 19, '#ffffff');
  setPixel(ctx, 26, 18, '#ffffff');
}

// === RUN CAT (side profile, facing left) ===
function drawRunCat(ctx) {
  ctx.clearRect(0, 0, SIZE, SIZE);

  // --- BODY (horizontal oval) ---
  fillCircle(ctx, 18, 22, 6, '#ffffff');
  fillCircle(ctx, 22, 21, 5, '#ffffff');

  // --- LEGS (running pose) ---
  // Back leg (stretched back)
  setPixel(ctx, 24, 25, '#ffffff');
  setPixel(ctx, 25, 26, '#ffffff');
  setPixel(ctx, 26, 27, '#ffffff');
  setPixel(ctx, 27, 28, '#ffffff');
  setPixel(ctx, 27, 29, '#ffb6c1');
  // Front leg (stretched forward)
  setPixel(ctx, 12, 25, '#ffffff');
  setPixel(ctx, 11, 26, '#ffffff');
  setPixel(ctx, 10, 27, '#ffffff');
  setPixel(ctx, 9, 28, '#ffffff');
  setPixel(ctx, 9, 29, '#ffb6c1');
  // Other legs tucked
  setPixel(ctx, 20, 27, '#ffffff');
  setPixel(ctx, 16, 27, '#ffffff');

  // --- HEAD (round, facing left) ---
  fillCircle(ctx, 12, 14, 9, '#ffffff');

  // --- EAR (pointed, top-left) ---
  setPixel(ctx, 6, 6, '#ffffff');
  setPixel(ctx, 5, 7, '#ffffff');
  setPixel(ctx, 6, 7, '#ffb6c1');
  setPixel(ctx, 7, 7, '#ffffff');
  setPixel(ctx, 6, 8, '#ffb6c1');
  setPixel(ctx, 7, 8, '#ffffff');

  // --- EYE (big, facing left) ---
  fillCircle(ctx, 8, 13, 3, '#3d2b1f');
  fillCircle(ctx, 7, 11, 1, '#ffffff');
  setPixel(ctx, 9, 14, '#ffffff');

  // --- BLUSH ---
  fillCircle(ctx, 6, 17, 2, '#ffb6c1');

  // --- NOSE ---
  setPixel(ctx, 4, 16, '#ff8899');

  // --- MOUTH ---
  setPixel(ctx, 5, 18, '#cc5555');
  setPixel(ctx, 6, 19, '#ff7799');

  // --- WHISKERS ---
  setPixel(ctx, 2, 14, '#666');
  setPixel(ctx, 1, 15, '#666');
  setPixel(ctx, 2, 16, '#666');
  setPixel(ctx, 1, 17, '#666');

  // --- TAIL (curved up) ---
  setPixel(ctx, 26, 20, '#ffffff');
  setPixel(ctx, 28, 18, '#ffffff');
  setPixel(ctx, 29, 16, '#ffffff');
  setPixel(ctx, 28, 14, '#ffffff');
  setPixel(ctx, 26, 13, '#ffffff');
}

// === SLEEP CAT (curled ball) ===
function drawSleepCat(ctx) {
  ctx.clearRect(0, 0, SIZE, SIZE);

  // --- BODY (big round ball) ---
  fillCircle(ctx, 18, 20, 10, '#ffffff');
  fillCircle(ctx, 16, 22, 9, '#f5f5f5');

  // --- HEAD (tucked on left side) ---
  fillCircle(ctx, 10, 18, 8, '#ffffff');

  // --- EAR (sticking up) ---
  setPixel(ctx, 6, 10, '#ffffff');
  setPixel(ctx, 5, 11, '#ffffff');
  setPixel(ctx, 6, 11, '#ffb6c1');
  setPixel(ctx, 7, 11, '#ffffff');
  setPixel(ctx, 6, 12, '#ffb6c1');

  // --- CLOSED EYES (sleeping ^ ^) ---
  setPixel(ctx, 7, 17, '#666');
  setPixel(ctx, 8, 16, '#666');
  setPixel(ctx, 9, 17, '#666');
  setPixel(ctx, 11, 17, '#666');
  setPixel(ctx, 12, 16, '#666');
  setPixel(ctx, 13, 17, '#666');

  // --- BLUSH ---
  fillCircle(ctx, 6, 20, 2, '#ffb6c1');

  // --- NOSE ---
  setPixel(ctx, 4, 19, '#ff8899');

  // --- TAIL (wrapped around from right) ---
  setPixel(ctx, 26, 24, '#ffffff');
  setPixel(ctx, 28, 22, '#ffffff');
  setPixel(ctx, 29, 19, '#ffffff');
  setPixel(ctx, 28, 16, '#ffffff');
  setPixel(ctx, 25, 14, '#ffffff');
  setPixel(ctx, 22, 13, '#ffffff');

  // --- Zzz ---
  setPixel(ctx, 24, 8, '#88bbee');
  setPixel(ctx, 25, 7, '#88bbee');
  setPixel(ctx, 26, 8, '#88bbee');
  setPixel(ctx, 25, 9, '#88bbee');
  setPixel(ctx, 27, 6, '#6699cc');
  setPixel(ctx, 28, 5, '#6699cc');
  setPixel(ctx, 29, 6, '#6699cc');
  setPixel(ctx, 28, 7, '#6699cc');
}

function generateSprite(drawFn) {
  const { c, ctx } = createCanvas();
  drawFn(ctx);
  return c;
}

// Generate all
const idleCanvas = generateSprite(drawIdleCat);
const runCanvas = generateSprite(drawRunCat);
const sleepCanvas = generateSprite(drawSleepCat);

// Display and download
const spritesDiv = document.getElementById('sprites');

[{name:'cat-idle.png', c:idleCanvas}, {name:'cat-run.png', c:runCanvas}, {name:'cat-sleep.png', c:sleepCanvas}].forEach(s => {
  const div = document.createElement('div');
  div.className = 'sprite-container';
  const label = document.createElement('div');
  label.textContent = s.name + ' (32x32)';
  div.appendChild(label);

  s.c.style.width = '256px';
  s.c.style.height = '256px';
  s.c.style.imageRendering = 'pixelated';
  div.appendChild(s.c);

  const link = document.createElement('a');
  link.download = s.name;
  link.href = s.c.toDataURL('image/png');
  link.textContent = 'Download ' + s.name;
  link.style.display = 'block';
  link.style.color = '#6cf';
  link.style.marginTop = '5px';
  div.appendChild(link);
  spritesDiv.appendChild(div);
});

console.log('32x32 sprites generated!');
</script>
</body>
</html>
