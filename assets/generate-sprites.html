function renderSprite(pixelMap, scale = 1) {
  const size = 32;
  const canvas = document.createElement('canvas');
  canvas.width = size * scale;
  canvas.height = size * scale;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const ch = pixelMap[y][x];
      if (ch !== '_' && ch !== ' ' && PALETTE[ch]) {
        ctx.fillStyle = PALETTE[ch];
        ctx.fillRect(x * scale, y * scale, scale, scale);
      }
    }
  }
  return canvas;
}

function exportPNG(canvas, filename) {
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.textContent = `Download ${filename}`;
  return link;
}

const spritesDiv = document.getElementById('sprites');

const idleCanvas = renderSprite(CAT_IDLE, 1);
const runCanvas = renderSprite(CAT_RUN, 1);
const sleepCanvas = renderSprite(CAT_SLEEP, 1);

[{name:'cat-idle.png', c:idleCanvas}, {name:'cat-run.png', c:runCanvas}, {name:'cat-sleep.png', c:sleepCanvas}].forEach(s => {
  const div = document.createElement('div');
  div.className = 'sprite-container';
  const label = document.createElement('div');
  label.textContent = s.name;
  div.appendChild(label);
  s.c.style.width = '192px';
  s.c.style.height = '192px';
  div.appendChild(s.c);
  const link = exportPNG(s.c, s.name);
  link.style.display = 'block';
  link.style.color = '#6cf';
  div.appendChild(link);
  spritesDiv.appendChild(div);
});
