<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>32x32 Cat Preview</title>
<style>
body { background: #222; color: #fff; font-family: sans-serif; padding: 20px; }
img { image-rendering: pixelated; border: 2px solid #555; margin: 10px; background: #87CEEB; }
.sprite-container { display: inline-block; text-align: center; margin: 15px; }
</style>
</head>
<body>
<h2>32x32 Mittens Preview</h2>
<div id="sprites"></div>
<script>
const SPRITES = [
  { src: 'cat-idle.png', label: 'Idle (Home: 4x)' },
  { src: 'cat-run.png', label: 'Run (Game: 2x)' },
  { src: 'cat-sleep.png', label: 'Sleep' }
];
const div = document.getElementById('sprites');
SPRITES.forEach(s => {
  const container = document.createElement('div');
  container.className = 'sprite-container';
  const label = document.createElement('div');
  label.textContent = s.label;
  container.appendChild(label);
  const img = document.createElement('img');
  img.src = s.src;
  img.style.width = '192px';
  img.style.height = '192px';
  container.appendChild(img);
  div.appendChild(container);
});
</script>
</body>
</html>
