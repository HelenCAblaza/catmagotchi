<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Catmagotchi 🐱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        html, body, canvas {
            touch-action: none;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            max-width: 100vw;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Desktop: keep nice max width */
        @media (min-width: 481px) {
            #game-container {
                max-width: 520px;
                height: auto;
                aspect-ratio: 480/800;
            }
        }
        canvas {
            display: block;
            /* Phaser Scale.FIT handles sizing — don't force stretch! */
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        #loading, #error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        #error-msg {
            color: #ff6666;
            display: none;
            font-size: 0.9rem;
            max-width: 80%;
        }
        #start-btn {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 30px;
            font-size: 1.1rem;
            background: #ff8c42;
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            z-index: 20;
            display: none;
        }
        #start-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">Loading Catmagotchi...</div>
        <div id="error-msg"></div>
        <button id="start-btn">Tap to Start! 🐱</button>
    </div>

    <!-- Phaser engine (local, no CDN dependency) -->
    <script src="phaser.min.js"></script>

    <!-- Game scenes -->
    <script src="src/BootScene.js?v=14"></script>
    <script src="src/HomeScene.js?v=14"></script>
    <script src="src/PlatformerScene.js?v=14"></script>
    <script src="src/game.js?v=14"></script>

    <script>
        // Error handling with stack trace
        window.onerror = function(msg, url, line, col, error) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-msg').style.display = 'block';
            let details = msg;
            if (error && error.stack) {
                details += '\n' + error.stack.split('\n').slice(0,3).join('\n');
            }
            document.getElementById('error-msg').textContent = 'Error: ' + details;
            console.error('Game error:', msg, 'at line', line, 'col', col, error);
            return true;
        };

        // Check if Phaser loaded
        if (typeof Phaser === 'undefined') {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('error-msg').textContent = 'Failed to load game engine. Please check your internet connection and refresh.';
        }

        // Mobile: show tap-to-start button (required for audio on iOS)
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile && typeof Phaser !== 'undefined') {
            document.getElementById('loading').style.display = 'none';
            const btn = document.getElementById('start-btn');
            btn.style.display = 'block';
            btn.addEventListener('click', function() {
                btn.style.display = 'none';
                // Game already initialized by game.js, but on mobile
                // we may need to resume audio context
                if (window.game && window.game.sound && window.game.sound.context) {
                    window.game.sound.context.resume();
                }
            });
        }
    </script>
</body>
</html>
