<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Catmagotchi 🐱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        html, body, canvas {
            touch-action: none;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            max-width: 100vw;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Desktop: keep nice max width */
        @media (min-width: 481px) {
            #game-container {
                max-width: 520px;
                height: auto;
                aspect-ratio: 480/800;
            }
        }
        canvas {
            display: block;
            /* Phaser Scale.FIT handles sizing — don't force stretch! */
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        #loading, #error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        #error-msg {
            color: #ff6666;
            display: none;
            font-size: 0.9rem;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">Loading Catmagotchi...</div>
        <div id="error-msg"></div>
    </div>

    <!-- Phaser engine (local, no CDN dependency) -->
    <script src="phaser.min.js"></script>

    <!-- Game scenes -->
    <script src="src/StartScene.js?v=17"></script>
    <script src="src/BootScene.js?v=17"></script>
    <script src="src/HomeScene.js?v=17"></script>
    <script src="src/PlatformerScene.js?v=17"></script>
    <script src="src/game.js?v=17"></script>

    <script>
        // Error handling with stack trace
        window.onerror = function(msg, url, line, col, error) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-msg').style.display = 'block';
            let details = msg;
            if (error && error.stack) {
                details += '\n' + error.stack.split('\n').slice(0,3).join('\n');
            }
            document.getElementById('error-msg').textContent = 'Error: ' + details;
            console.error('Game error:', msg, 'at line', line, 'col', col, error);
            return true;
        };

        // Check if Phaser loaded
        if (typeof Phaser === 'undefined') {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('error-msg').textContent = 'Failed to load game engine. Please check your internet connection and refresh.';
        }
    </script>
</body>
</html>
